{{ define "main" }}
  {{ $pages := .Pages.ByDate.Reverse }}
  <section class="block">
    <h1 class="h1" style="margin-bottom: 8px;">全部文章</h1>
    <div class="mute" style="font-size: 13px;">
      {{ len $pages }} 篇文章 &middot; 2020 &ndash; {{ now.Year }}
    </div>
  </section>

  <section style="padding-bottom: 48px;">
    {{ range $pages.GroupByDate "2006" }}
      <div>
        <div class="year-head">
          <h2 class="y">{{ .Key }}</h2>
          <div class="count">{{ len .Pages }}</div>
        </div>
        <div class="post-list">
          {{ range .Pages.ByDate.Reverse }}
            {{ $d := .Date }}
            <a class="post-row" href="{{ .RelPermalink }}">
              <span class="date">{{ $d.Format "01.02" }}</span>
              <span class="title">{{ .Title }}</span>
            </a>
          {{ end }}
        </div>
      </div>
    {{ end }}
  </section>
{{ end }}
