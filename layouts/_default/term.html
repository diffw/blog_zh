{{ define "main" }}
  <section class="page-intro">
    <h1>{{ .Title }}</h1>
  </section>
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "2006-01-02" }}</time>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
    {{ end }}
  </ul>
{{ end }}
