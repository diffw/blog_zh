{{ define "main" }}
  <section class="page-intro page-intro--archive">
    <p class="eyebrow">Tag</p>
    <h1>{{ .Title }}</h1>
  </section>
  <ul class="archive-list">
    {{ range .Pages.ByDate.Reverse }}
      <li class="archive-item">
        <a class="archive-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Jan 2" }}</time>
      </li>
    {{ end }}
  </ul>
{{ end }}
